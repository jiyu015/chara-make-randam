<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ドット絵キャラメーカー</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: 'Press Start 2P', monospace; min-height: 100vh; padding: 16px; }
  h1 { text-align: center; font-size: clamp(12px, 3vw, 20px); color: #fff; text-shadow: 0 0 12px #a07aff, 0 0 24px #a07aff; margin-bottom: 6px; }
  .subtitle { text-align: center; font-size: 9px; color: #a07aff; letter-spacing: .3em; margin-bottom: 20px; }
  .layout { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; max-width: 860px; margin: 0 auto; }
  .left { flex: 1; min-width: 240px; max-width: 380px; display: flex; flex-direction: column; gap: 10px; }
  .right { flex: 1; min-width: 200px; max-width: 300px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .panel { background: #16213e; border: 1px solid #333; border-radius: 3px; padding: 10px; }
  .panel-title { font-size: 8px; color: #888; letter-spacing: .2em; margin-bottom: 8px; }
  .btn-group { display: flex; flex-wrap: wrap; gap: 5px; }
  button.pb { border: 2px solid #555; background: #2a2a4a; color: #e0e0e0; cursor: pointer; font-family: 'Press Start 2P', monospace; font-size: 9px; padding: 5px 8px; border-radius: 2px; transition: all .15s; }
  button.pb:hover { background: #3a3a6a; border-color: #888; }
  button.pb.on { background: #4a3a8a; border-color: #a07aff; color: #fff; }
  .swatches { display: flex; flex-wrap: wrap; gap: 6px; }
  .swatch { width: 22px; height: 22px; border: 2px solid #555; border-radius: 2px; cursor: pointer; transition: all .1s; }
  .swatch:hover { transform: scale(1.1); }
  .swatch.on { border-color: #fff; transform: scale(1.25); }
  .preview-box { background: #16213e; border: 2px solid #a07aff; border-radius: 3px; padding: 14px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  #previewWrap { background: #0d0d1a; padding: 12px; border-radius: 2px; }
  #mainCanvas { image-rendering: pixelated; display: block; }
  .size-row { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
  button.action { width: 100%; padding: 11px; font-size: 11px; font-family: 'Press Start 2P', monospace; cursor: pointer; border-radius: 2px; letter-spacing: .05em; transition: all .15s; }
  button.action:hover { transform: scale(1.02); }
  button.rand { border: 2px solid #fbbf24; background: #2a2000; color: #fbbf24; }
  button.save { border: 2px solid #4ade80; background: #0a2a14; color: #4ade80; }
  .all-sizes { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
  .size-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .size-item canvas { image-rendering: pixelated; background: #0d0d1a; }
  .size-item span { font-size: 7px; color: #666; }
</style>
</head>
<body>

<div class="subtitle">★ PIXEL ART MAKER ★</div>
<h1>ドット絵キャラメーカー</h1>

<div class="layout">
  <div class="left">
    <div class="panel"><div class="panel-title">キャラクター種類</div><div class="btn-group" id="typeButtons"></div></div>
    <div class="panel"><div class="panel-title">肌の色</div><div class="swatches" id="skinSwatches"></div></div>
    <div class="panel"><div class="panel-title">髪の色</div><div class="swatches" id="hairSwatches"></div></div>
    <div class="panel"><div class="panel-title">服の色</div><div class="swatches" id="clothSwatches"></div></div>
    <div class="panel"><div class="panel-title">髪型</div><div class="btn-group" id="hairStyleButtons"></div></div>
    <div class="panel"><div class="panel-title">服装</div><div class="btn-group" id="outfitButtons"></div></div>
  </div>
  <div class="right">
    <div class="preview-box">
      <div class="panel-title" style="margin-bottom:0">プレビュー</div>
      <div id="previewWrap"><canvas id="mainCanvas"></canvas></div>
      <div class="size-row" id="sizeButtons"></div>
    </div>
    <button class="action rand" onclick="doRandom()">🎲 ランダム作成</button>
    <button class="action save" id="saveBtn">💾 PNG保存</button>
    <div class="panel" style="width:100%">
      <div class="panel-title">全サイズ比較</div>
      <div class="all-sizes" id="allSizes"></div>
    </div>
  </div>
</div>

<script>
const SKIN  = { pale:"#FFE8D0", light:"#FDDBB4", medium:"#D4956A", dark:"#8B5E3C" };
const HAIR  = { black:"#1A1A1A", brown:"#6B3A2A", blonde:"#E8C84A", white:"#E8E8E8", red:"#C0392B", blue:"#2980B9", green:"#27AE60", pink:"#E91E8C" };
const CLOTH = { red:"#C0392B", blue:"#2980B9", green:"#27AE60", purple:"#8E44AD", yellow:"#F39C12", white:"#ECF0F1", black:"#2C3E50", pink:"#E91E8C", gold:"#F1C40F", silver:"#BDC3C7", brown:"#795548", navy:"#1A237E" };

const CHAR_TYPES = [
  {id:"child_boy",   label:"👦子供男", group:"child"},
  {id:"child_girl",  label:"👧子供女", group:"child"},
  {id:"young_man",   label:"🧑青年男", group:"adult"},
  {id:"young_woman", label:"👩青年女", group:"adult"},
  {id:"old_man",     label:"👴老人",   group:"elder"},
  {id:"old_woman",   label:"👵老婆",   group:"elder"},
  {id:"king",        label:"👑王様",   group:"royal"},
  {id:"princess",    label:"👸お姫様", group:"royal"},
  {id:"soldier",     label:"⚔️兵士",  group:"soldier"},
];
const HAIRSTYLES = {
  child:   [{id:"short",l:"ショート"},{id:"bowl",l:"おかっぱ"},{id:"spiky",l:"トゲトゲ"}],
  adult:   [{id:"short",l:"ショート"},{id:"long",l:"ロング"},{id:"spiky",l:"トゲトゲ"},{id:"ponytail",l:"ポニーテール"}],
  elder:   [{id:"bald",l:"ハゲ"},{id:"short",l:"白髪"},{id:"bun",l:"まとめ髪"}],
  royal:   [{id:"long",l:"ロング"},{id:"crown",l:"王冠ヘア"},{id:"ponytail",l:"ポニーテール"}],
  soldier: [{id:"short",l:"ショート"},{id:"helmet",l:"兜"}],
};
const OUTFITS = {
  child:   [{id:"casual",l:"カジュアル"},{id:"uniform",l:"制服"}],
  adult:   [{id:"robe",l:"ローブ"},{id:"armor_light",l:"軽鎧"},{id:"casual",l:"カジュアル"}],
  elder:   [{id:"robe",l:"ローブ"},{id:"casual",l:"普段着"}],
  royal:   [{id:"royal_robe",l:"王族ローブ"},{id:"dress",l:"ドレス"}],
  soldier: [{id:"armor",l:"鎧"},{id:"armor_heavy",l:"重鎧"}],
};

const SIZES = [16, 32, 64, 128];
const DISPLAY_SIZE = 128;

let config = { type:"child_boy", skin:Object.values(SKIN)[0], hair:Object.values(HAIR)[0], cloth:Object.values(CLOTH)[0], hairStyle:"short", outfit:"casual" };
let currentSize = 64;

// ═══════════════════════════════════════════════════════════
//  描画エンジン：サイズごとに専用ピクセルアートを描画
// ═══════════════════════════════════════════════════════════
function drawChar(canvas, cfg, size) {
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0,0,size,size);
  ctx.imageSmoothingEnabled = false;

  const group = CHAR_TYPES.find(c=>c.id===cfg.type)?.group || "adult";

  if(size === 16)       draw16(ctx, cfg, group);
  else if(size === 32)  draw32(ctx, cfg, group);
  else if(size === 64)  draw64(ctx, cfg, group);
  else if(size === 128) draw128(ctx, cfg, group);
}

// ─── ヘルパー：矩形塗り ────────────────────────────────────
function px(ctx, color, x, y, w, h) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}

// ───────────────────────────────────────────────────────────
//  16×16 専用描画（枠いっぱいに描く・シルエット重視）
// ───────────────────────────────────────────────────────────
function draw16(ctx, cfg, group) {
  const sk=cfg.skin, hr=cfg.hair, cl=cfg.cloth;
  const isChild = group==="child";
  const isElder = group==="elder";
  const isRoyal = cfg.type==="king"||cfg.type==="princess";
  const isSoldier = group==="soldier";

  // 子供は少し小さめ、それ以外は枠いっぱい
  const bodyY = isChild ? 8 : 7;
  const headY = isChild ? 2 : 0;
  const headW = isChild ? 6 : 8;
  const headH = isChild ? 5 : 6;
  const headX = Math.floor((16-headW)/2);

  // 頭
  px(ctx, sk, headX, headY, headW, headH);

  // 目
  px(ctx, "#000", headX+1, headY+2, 1, 1);
  px(ctx, "#000", headX+headW-2, headY+2, 1, 1);

  // 口
  px(ctx, "#a05050", headX+2, headY+headH-1, headW-4, 1);

  // 髪
  const hs = cfg.hairStyle;
  if(hs==="bald") {
    px(ctx, "#E8E8E8", headX, headY+headH-1, headW, 1);
  } else if(hs==="spiky") {
    px(ctx, hr, headX, headY, headW, 2);
    px(ctx, hr, headX+1, headY-1, 1, 1);
    px(ctx, hr, headX+3, headY-2, 1, 1);
    px(ctx, hr, headX+headW-2, headY-1, 1, 1);
  } else if(hs==="long") {
    px(ctx, hr, headX, headY, headW, 2);
    px(ctx, hr, headX-1, headY, 1, headH+2);
    px(ctx, hr, headX+headW, headY, 1, headH+2);
  } else if(hs==="ponytail") {
    px(ctx, hr, headX, headY, headW, 2);
    px(ctx, hr, headX+headW, headY, 1, headH+3);
  } else if(hs==="crown"||hs==="helmet") {
    const cc = hs==="crown"?"#F1C40F":"#BDC3C7";
    px(ctx, cc, headX-1, headY-2, headW+2, 3);
    if(hs==="crown") { px(ctx,cc,headX,headY-3,1,2); px(ctx,cc,headX+3,headY-4,1,2); px(ctx,cc,headX+headW-1,headY-3,1,2); }
  } else {
    // short / bowl / bun / white
    px(ctx, hr, headX, headY, headW, 2);
    px(ctx, hr, headX-1, headY, 1, headH-1);
    px(ctx, hr, headX+headW, headY, 1, headH-1);
  }

  // 王様王冠追加
  if(cfg.type==="king") {
    px(ctx,"#F1C40F",headX-1,headY-2,headW+2,2);
    px(ctx,"#F1C40F",headX,headY-4,1,3); px(ctx,"#F1C40F",headX+3,headY-4,1,3); px(ctx,"#F1C40F",headX+headW-1,headY-4,1,3);
    px(ctx,"#e74c3c",headX+3,headY-4,1,1);
  }
  // お姫様ティアラ
  if(cfg.type==="princess") {
    px(ctx,"#F1C40F",headX+1,headY-1,headW-2,1);
    px(ctx,"#e74c3c",headX+Math.floor(headW/2),headY-2,1,2);
  }

  // 胴体
  px(ctx, cl, 4, bodyY, 8, 5);

  // 服飾り
  if(cfg.outfit==="royal_robe"||cfg.outfit==="dress") {
    px(ctx,"#F1C40F",4,bodyY,8,1);
    px(ctx,"#F1C40F",7,bodyY,1,5);
  }
  if(cfg.outfit==="armor"||cfg.outfit==="armor_light"||cfg.outfit==="armor_heavy") {
    px(ctx,"#BDC3C7",4,bodyY,8,2);
    px(ctx,"#7f8c8d",4,bodyY+2,8,1);
  }
  if(isSoldier) { px(ctx,"#BDC3C7",3,bodyY+1,2,3); px(ctx,"#BDC3C7",11,bodyY+1,2,3); }

  // 腕
  px(ctx, cl, 2, bodyY, 2, 4);
  px(ctx, cl, 12, bodyY, 2, 4);
  px(ctx, sk, 2, bodyY+4, 2, 1);
  px(ctx, sk, 12, bodyY+4, 2, 1);

  // 足
  px(ctx, cl, 5, bodyY+5, 2, 3);
  px(ctx, cl, 9, bodyY+5, 2, 3);
  px(ctx,"#3d2b1f",4,bodyY+8,3,1);
  px(ctx,"#3d2b1f",9,bodyY+8,3,1);
}

// ───────────────────────────────────────────────────────────
//  32×32 専用描画
// ───────────────────────────────────────────────────────────
function draw32(ctx, cfg, group) {
  const sk=cfg.skin, hr=cfg.hair, cl=cfg.cloth;
  const isChild = group==="child";
  const isSoldier = group==="soldier";

  const headW = isChild ? 10 : 12;
  const headH = isChild ? 10 : 12;
  const headX = Math.floor((32-headW)/2);
  const headY = isChild ? 2 : 1;
  const bodyY = headY + headH + 1;
  const bodyW = isChild ? 10 : 12;
  const bodyH = isChild ? 9 : 10;
  const bodyX = Math.floor((32-bodyW)/2);

  // 顔
  px(ctx,sk,headX,headY,headW,headH);

  // 目
  px(ctx,"#000",headX+2,headY+3,2,2);
  px(ctx,"#000",headX+headW-4,headY+3,2,2);
  // 白目
  px(ctx,"#fff",headX+2,headY+3,1,1);
  px(ctx,"#fff",headX+headW-4,headY+3,1,1);

  // 口
  px(ctx,"#a05050",headX+3,headY+headH-3,headW-6,1);
  if(group==="elder") { px(ctx,"#c9956a",headX+1,headY+headH-5,1,1); px(ctx,"#c9956a",headX+headW-2,headY+headH-5,1,1); }

  // 鼻
  px(ctx,"#c08060",headX+Math.floor(headW/2)-1,headY+Math.floor(headH*0.55),2,1);

  // 髪
  const hs=cfg.hairStyle;
  if(hs==="bald") {
    px(ctx,"#E8E8E8",headX,headY,headW,2);
  } else if(hs==="spiky") {
    px(ctx,hr,headX,headY,headW,3);
    px(ctx,hr,headX+1,headY-2,2,3); px(ctx,hr,headX+4,headY-3,2,4); px(ctx,hr,headX+headW-3,headY-2,2,3);
  } else if(hs==="long") {
    px(ctx,hr,headX,headY,headW,4);
    px(ctx,hr,headX-2,headY,2,headH+5); px(ctx,hr,headX+headW,headY,2,headH+5);
    px(ctx,hr,headX-1,headY+headH+5,headW+2,2);
  } else if(hs==="ponytail") {
    px(ctx,hr,headX,headY,headW,4);
    px(ctx,hr,headX+headW,headY,2,headH+7);
  } else if(hs==="bun") {
    px(ctx,hr,headX,headY,headW,3);
    px(ctx,hr,headX+3,headY-4,headW-6,5);
  } else if(hs==="crown"||hs==="helmet") {
    const cc=hs==="crown"?"#F1C40F":"#BDC3C7";
    px(ctx,cc,headX-1,headY-4,headW+2,5);
    if(hs==="crown"){px(ctx,cc,headX+1,headY-7,2,4);px(ctx,cc,headX+5,headY-8,2,5);px(ctx,cc,headX+headW-3,headY-7,2,4);}
    px(ctx,hr,headX,headY,headW,3);
  } else {
    px(ctx,hr,headX,headY,headW,4);
    px(ctx,hr,headX-1,headY,2,headH-2); px(ctx,hr,headX+headW-1,headY,2,headH-2);
  }

  // 王様王冠
  if(cfg.type==="king"){
    px(ctx,"#F1C40F",headX-1,headY-4,headW+2,4);
    px(ctx,"#F1C40F",headX+1,headY-8,2,5); px(ctx,"#F1C40F",headX+5,headY-9,2,6); px(ctx,"#F1C40F",headX+headW-3,headY-8,2,5);
    px(ctx,"#e74c3c",headX+5,headY-9,2,2);
  }
  // お姫様ティアラ
  if(cfg.type==="princess"){
    px(ctx,"#F1C40F",headX+2,headY-2,headW-4,2);
    px(ctx,"#e74c3c",headX+Math.floor(headW/2)-1,headY-5,2,4);
  }

  // 胴体
  px(ctx,cl,bodyX,bodyY,bodyW,bodyH);

  // 服飾り
  if(cfg.outfit==="royal_robe"||cfg.outfit==="dress"){
    px(ctx,"#F1C40F",bodyX,bodyY,bodyW,2); px(ctx,"#F1C40F",bodyX+Math.floor(bodyW/2)-1,bodyY,2,bodyH);
  }
  if(cfg.outfit==="armor"||cfg.outfit==="armor_light"||cfg.outfit==="armor_heavy"){
    px(ctx,"#BDC3C7",bodyX,bodyY,bodyW,4); px(ctx,"#7f8c8d",bodyX,bodyY+4,bodyW,1);
  }
  if(isSoldier){ px(ctx,"#BDC3C7",bodyX-2,bodyY+2,3,bodyH-2); px(ctx,"#BDC3C7",bodyX+bodyW-1,bodyY+2,3,bodyH-2); }

  // 腕
  const armW=3, armH=8;
  px(ctx,cl,bodyX-armW,bodyY+1,armW,armH); px(ctx,cl,bodyX+bodyW,bodyY+1,armW,armH);
  px(ctx,sk,bodyX-armW,bodyY+1+armH,armW,2); px(ctx,sk,bodyX+bodyW,bodyY+1+armH,armW,2);

  // 足
  const legW=4, legH=isChild?5:6;
  px(ctx,cl,bodyX+1,bodyY+bodyH,legW,legH); px(ctx,cl,bodyX+bodyW-legW-1,bodyY+bodyH,legW,legH);
  px(ctx,"#3d2b1f",bodyX,bodyY+bodyH+legH,legW+1,2); px(ctx,"#3d2b1f",bodyX+bodyW-legW-1,bodyY+bodyH+legH,legW+1,2);
}

// ───────────────────────────────────────────────────────────
//  64×64 専用描画
// ───────────────────────────────────────────────────────────
function draw64(ctx, cfg, group) {
  const sk=cfg.skin, hr=cfg.hair, cl=cfg.cloth;
  const isChild = group==="child";
  const isSoldier = group==="soldier";
  const isElder = group==="elder";

  const headW = isChild ? 20 : 24;
  const headH = isChild ? 20 : 24;
  const headX = Math.floor((64-headW)/2);
  const headY = isChild ? 4 : 2;
  const bodyY = headY + headH + 2;
  const bodyW = isChild ? 20 : 24;
  const bodyH = isChild ? 18 : 20;
  const bodyX = Math.floor((64-bodyW)/2);

  // 顔
  px(ctx,sk,headX,headY,headW,headH);
  // 輪郭シャドウ
  px(ctx,"rgba(0,0,0,0.15)",headX,headY+headH-1,headW,1);
  px(ctx,"rgba(0,0,0,0.1)",headX+headW-1,headY,1,headH);

  // 目（より細かく）
  px(ctx,"#222",headX+4,headY+7,3,3);
  px(ctx,"#222",headX+headW-7,headY+7,3,3);
  px(ctx,"#fff",headX+4,headY+7,1,1);
  px(ctx,"#fff",headX+headW-7,headY+7,1,1);
  // まつげ（女性系）
  if(cfg.type==="young_woman"||cfg.type==="child_girl"||cfg.type==="princess"||cfg.type==="old_woman"){
    px(ctx,"#222",headX+3,headY+6,5,1); px(ctx,"#222",headX+headW-8,headY+6,5,1);
  }

  // 鼻
  px(ctx,"#c08060",headX+headW/2-1,headY+headH*0.5,3,2);

  // 口
  px(ctx,"#c0606a",headX+5,headY+headH-6,headW-10,2);
  px(ctx,"#e08080",headX+6,headY+headH-5,headW-12,1);

  // 老人しわ
  if(isElder){
    px(ctx,"#c9956a",headX+2,headY+8,2,1); px(ctx,"#c9956a",headX+headW-4,headY+8,2,1);
    px(ctx,"#c9956a",headX+3,headY+headH-4,3,1); px(ctx,"#c9956a",headX+headW-6,headY+headH-4,3,1);
  }

  // 髪
  const hs=cfg.hairStyle;
  if(hs==="bald") {
    px(ctx,"#E8E8E8",headX,headY,headW,4);
  } else if(hs==="spiky") {
    px(ctx,hr,headX,headY,headW,6);
    px(ctx,hr,headX+2,headY-5,4,6); px(ctx,hr,headX+8,headY-7,4,8); px(ctx,hr,headX+headW-6,headY-5,4,6);
    px(ctx,hr,headX+14,headY-6,3,7);
  } else if(hs==="long") {
    px(ctx,hr,headX,headY,headW,7);
    px(ctx,hr,headX-4,headY,4,headH+10); px(ctx,hr,headX+headW,headY,4,headH+10);
    px(ctx,hr,headX-2,headY+headH+10,headW+4,4);
  } else if(hs==="ponytail") {
    px(ctx,hr,headX,headY,headW,7);
    px(ctx,hr,headX+headW,headY+2,5,headH+12);
    px(ctx,hr,headX+headW-2,headY+headH+12,6,4);
  } else if(hs==="bun") {
    px(ctx,hr,headX,headY,headW,6);
    px(ctx,hr,headX+5,headY-8,headW-10,10);
    px(ctx,hr,headX+3,headY-6,headW-6,8);
  } else if(hs==="crown"||hs==="helmet") {
    const cc=hs==="crown"?"#F1C40F":"#BDC3C7";
    px(ctx,cc,headX-2,headY-8,headW+4,10);
    if(hs==="crown"){ px(ctx,cc,headX+2,headY-14,4,8); px(ctx,cc,headX+10,headY-16,4,9); px(ctx,cc,headX+headW-6,headY-14,4,8); px(ctx,"#e74c3c",headX+10,headY-16,4,3); }
    else { px(ctx,"#999",headX-2,headY-2,headW+4,3); }
    px(ctx,hr,headX,headY,headW,5);
  } else {
    // short/bowl
    px(ctx,hr,headX,headY,headW,7);
    px(ctx,hr,headX-2,headY,3,headH-3); px(ctx,hr,headX+headW-1,headY,3,headH-3);
    if(hs==="bowl") px(ctx,hr,headX,headY+headH-3,headW,3);
  }

  // 王様
  if(cfg.type==="king"){
    px(ctx,"#F1C40F",headX-2,headY-8,headW+4,8);
    px(ctx,"#F1C40F",headX+2,headY-16,4,10); px(ctx,"#F1C40F",headX+10,headY-18,4,11); px(ctx,"#F1C40F",headX+headW-6,headY-16,4,10);
    px(ctx,"#e74c3c",headX+2,headY-16,4,3); px(ctx,"#e74c3c",headX+10,headY-18,4,3); px(ctx,"#e74c3c",headX+headW-6,headY-16,4,3);
    px(ctx,hr,headX,headY,headW,6);
  }
  // お姫様
  if(cfg.type==="princess"){
    px(ctx,"#F1C40F",headX+3,headY-4,headW-6,4);
    px(ctx,"#e74c3c",headX+Math.floor(headW/2)-2,headY-9,4,7);
    px(ctx,"#F1C40F",headX+4,headY-9,3,3); px(ctx,"#F1C40F",headX+headW-7,headY-9,3,3);
  }

  // 胴体
  px(ctx,cl,bodyX,bodyY,bodyW,bodyH);
  // 胴体ハイライト
  px(ctx,"rgba(255,255,255,0.1)",bodyX+2,bodyY+2,4,bodyH-4);

  // 服飾り
  if(cfg.outfit==="royal_robe"||cfg.outfit==="dress"){
    px(ctx,"#F1C40F",bodyX,bodyY,bodyW,3); px(ctx,"#F1C40F",bodyX+Math.floor(bodyW/2)-1,bodyY,3,bodyH);
    if(cfg.outfit==="dress"){ px(ctx,cl,bodyX-3,bodyY+Math.floor(bodyH*0.5),bodyW+6,bodyH); }
  }
  if(cfg.outfit==="armor"||cfg.outfit==="armor_light"||cfg.outfit==="armor_heavy"){
    px(ctx,"#BDC3C7",bodyX,bodyY,bodyW,7); px(ctx,"#7f8c8d",bodyX,bodyY+7,bodyW,2);
    px(ctx,"rgba(255,255,255,0.3)",bodyX+2,bodyY+1,4,5);
    if(cfg.outfit==="armor_heavy"){ px(ctx,"#7f8c8d",bodyX,bodyY+9,bodyW,bodyH-9); px(ctx,"#BDC3C7",bodyX,bodyY+11,bodyW,2); }
  }
  if(isSoldier){ px(ctx,"#BDC3C7",bodyX-4,bodyY+3,5,bodyH-3); px(ctx,"#BDC3C7",bodyX+bodyW-1,bodyY+3,5,bodyH-3); }

  // 腕
  const armW=5, armH=14;
  px(ctx,cl,bodyX-armW,bodyY+2,armW,armH); px(ctx,cl,bodyX+bodyW,bodyY+2,armW,armH);
  px(ctx,sk,bodyX-armW,bodyY+2+armH,armW,4); px(ctx,sk,bodyX+bodyW,bodyY+2+armH,armW,4);

  // 足
  const legW=8, legH=isChild?10:12;
  px(ctx,cl,bodyX+2,bodyY+bodyH,legW,legH); px(ctx,cl,bodyX+bodyW-legW-2,bodyY+bodyH,legW,legH);
  px(ctx,"#3d2b1f",bodyX,bodyY+bodyH+legH,legW+2,3); px(ctx,"#3d2b1f",bodyX+bodyW-legW-2,bodyY+bodyH+legH,legW+2,3);
}

// ───────────────────────────────────────────────────────────
//  128×128 専用描画
// ───────────────────────────────────────────────────────────
function draw128(ctx, cfg, group) {
  const sk=cfg.skin, hr=cfg.hair, cl=cfg.cloth;
  const isChild = group==="child";
  const isSoldier = group==="soldier";
  const isElder = group==="elder";

  const headW = isChild ? 40 : 48;
  const headH = isChild ? 40 : 48;
  const headX = Math.floor((128-headW)/2);
  const headY = isChild ? 8 : 4;
  const bodyY = headY + headH + 4;
  const bodyW = isChild ? 38 : 46;
  const bodyH = isChild ? 34 : 40;
  const bodyX = Math.floor((128-bodyW)/2);

  // 顔ベース
  px(ctx,sk,headX,headY,headW,headH);
  // 顔の立体感
  px(ctx,"rgba(255,255,255,0.15)",headX+2,headY+2,headW/2,headH/2);
  px(ctx,"rgba(0,0,0,0.1)",headX,headY+headH-2,headW,2);
  px(ctx,"rgba(0,0,0,0.08)",headX+headW-2,headY,2,headH);

  // 目（細かく）
  px(ctx,"#222",headX+8,headY+14,6,6);
  px(ctx,"#222",headX+headW-14,headY+14,6,6);
  px(ctx,"#3a5f8a",headX+9,headY+15,4,4);
  px(ctx,"#000",headX+10,headY+16,2,2);
  px(ctx,"#fff",headX+9,headY+15,2,2);
  px(ctx,"#3a5f8a",headX+headW-13,headY+15,4,4);
  px(ctx,"#000",headX+headW-12,headY+16,2,2);
  px(ctx,"#fff",headX+headW-13,headY+15,2,2);

  // まつげ
  if(cfg.type==="young_woman"||cfg.type==="child_girl"||cfg.type==="princess"||cfg.type==="old_woman"){
    px(ctx,"#222",headX+6,headY+12,10,2); px(ctx,"#222",headX+headW-16,headY+12,10,2);
  }

  // 眉毛
  px(ctx,isElder?"#aaa":hr,headX+8,headY+10,8,2);
  px(ctx,isElder?"#aaa":hr,headX+headW-16,headY+10,8,2);

  // 鼻
  px(ctx,"#c08060",headX+headW/2-2,headY+headH*0.5,5,3);
  px(ctx,"rgba(0,0,0,0.1)",headX+headW/2-1,headY+headH*0.5+2,3,1);

  // 口
  px(ctx,"#c0606a",headX+10,headY+headH-12,headW-20,4);
  px(ctx,"#e08080",headX+12,headY+headH-10,headW-24,2);
  px(ctx,"rgba(0,0,0,0.1)",headX+10,headY+headH-9,headW-20,1);

  // 老人しわ
  if(isElder){
    px(ctx,"#c9956a",headX+4,headY+16,4,2); px(ctx,"#c9956a",headX+headW-8,headY+16,4,2);
    px(ctx,"#c9956a",headX+6,headY+headH-8,6,2); px(ctx,"#c9956a",headX+headW-12,headY+headH-8,6,2);
    px(ctx,"#c9956a",headX+8,headY+headH-14,3,2); px(ctx,"#c9956a",headX+headW-11,headY+headH-14,3,2);
  }

  // 髪
  const hs=cfg.hairStyle;
  if(hs==="bald"){
    px(ctx,"#E8E8E8",headX,headY,headW,6);
  } else if(hs==="spiky"){
    px(ctx,hr,headX,headY,headW,12);
    px(ctx,hr,headX+4,headY-10,8,12); px(ctx,hr,headX+16,headY-14,8,16); px(ctx,hr,headX+headW-12,headY-10,8,12);
    px(ctx,hr,headX+26,headY-12,6,14);
  } else if(hs==="long"){
    px(ctx,hr,headX,headY,headW,14);
    px(ctx,hr,headX-8,headY,8,headH+20); px(ctx,hr,headX+headW,headY,8,headH+20);
    px(ctx,hr,headX-4,headY+headH+20,headW+8,8);
  } else if(hs==="ponytail"){
    px(ctx,hr,headX,headY,headW,14);
    px(ctx,hr,headX+headW,headY+4,10,headH+24);
    px(ctx,hr,headX+headW-4,headY+headH+24,12,8);
  } else if(hs==="bun"){
    px(ctx,hr,headX,headY,headW,12);
    px(ctx,hr,headX+10,headY-16,headW-20,20);
    px(ctx,hr,headX+6,headY-12,headW-12,16);
  } else if(hs==="crown"||hs==="helmet"){
    const cc=hs==="crown"?"#F1C40F":"#BDC3C7";
    px(ctx,cc,headX-4,headY-16,headW+8,20);
    if(hs==="crown"){
      px(ctx,cc,headX+4,headY-28,8,16); px(ctx,cc,headX+20,headY-32,8,18); px(ctx,cc,headX+headW-12,headY-28,8,16);
      px(ctx,"#e74c3c",headX+4,headY-28,8,6); px(ctx,"#e74c3c",headX+20,headY-32,8,6); px(ctx,"#e74c3c",headX+headW-12,headY-28,8,6);
      px(ctx,"rgba(255,255,255,0.3)",headX-2,headY-14,headW+4,4);
    } else {
      px(ctx,"#888",headX-4,headY-4,headW+8,6);
      px(ctx,"rgba(255,255,255,0.2)",headX,headY-12,headW,4);
    }
    px(ctx,hr,headX,headY,headW,10);
  } else {
    px(ctx,hr,headX,headY,headW,14);
    px(ctx,hr,headX-4,headY,6,headH-6); px(ctx,hr,headX+headW-2,headY,6,headH-6);
    if(hs==="bowl") px(ctx,hr,headX,headY+headH-6,headW,6);
  }

  // 王様
  if(cfg.type==="king"){
    px(ctx,"#F1C40F",headX-4,headY-16,headW+8,16);
    px(ctx,"#F1C40F",headX+4,headY-32,8,20); px(ctx,"#F1C40F",headX+20,headY-36,8,22); px(ctx,"#F1C40F",headX+headW-12,headY-32,8,20);
    px(ctx,"#e74c3c",headX+4,headY-32,8,6); px(ctx,"#e74c3c",headX+20,headY-36,8,6); px(ctx,"#e74c3c",headX+headW-12,headY-32,8,6);
    px(ctx,"rgba(255,255,255,0.3)",headX,headY-14,headW,4);
    px(ctx,hr,headX,headY,headW,12);
  }
  // お姫様
  if(cfg.type==="princess"){
    px(ctx,"#F1C40F",headX+6,headY-8,headW-12,8);
    px(ctx,"#e74c3c",headX+headW/2-4,headY-18,8,14);
    px(ctx,"#F1C40F",headX+8,headY-18,6,6); px(ctx,"#F1C40F",headX+headW-14,headY-18,6,6);
    px(ctx,"rgba(255,255,255,0.3)",headX+8,headY-6,headW-16,3);
  }

  // 胴体
  px(ctx,cl,bodyX,bodyY,bodyW,bodyH);
  px(ctx,"rgba(255,255,255,0.12)",bodyX+3,bodyY+3,8,bodyH-6);
  px(ctx,"rgba(0,0,0,0.1)",bodyX+bodyW-4,bodyY,4,bodyH);

  // 服飾り
  if(cfg.outfit==="royal_robe"||cfg.outfit==="dress"){
    px(ctx,"#F1C40F",bodyX,bodyY,bodyW,5); px(ctx,"#F1C40F",bodyX+bodyW/2-2,bodyY,4,bodyH);
    px(ctx,"rgba(255,255,255,0.2)",bodyX+2,bodyY+1,8,3);
    if(cfg.outfit==="dress"){ px(ctx,cl,bodyX-6,bodyY+bodyH*0.5,bodyW+12,bodyH); px(ctx,"#F1C40F",bodyX-4,bodyY+bodyH*0.5,bodyW+8,3); }
  }
  if(cfg.outfit==="armor"||cfg.outfit==="armor_light"||cfg.outfit==="armor_heavy"){
    px(ctx,"#BDC3C7",bodyX,bodyY,bodyW,14); px(ctx,"#7f8c8d",bodyX,bodyY+14,bodyW,4);
    px(ctx,"rgba(255,255,255,0.4)",bodyX+4,bodyY+2,8,10);
    px(ctx,"rgba(0,0,0,0.15)",bodyX+bodyW-8,bodyY,8,14);
    if(cfg.outfit==="armor_heavy"){ px(ctx,"#7f8c8d",bodyX,bodyY+18,bodyW,bodyH-18); px(ctx,"#BDC3C7",bodyX,bodyY+22,bodyW,4); px(ctx,"rgba(255,255,255,0.2)",bodyX+4,bodyY+22,8,2); }
  }
  if(isSoldier){ px(ctx,"#BDC3C7",bodyX-8,bodyY+6,10,bodyH-6); px(ctx,"#BDC3C7",bodyX+bodyW-2,bodyY+6,10,bodyH-6); px(ctx,"rgba(255,255,255,0.3)",bodyX-6,bodyY+8,6,10); }

  // 腕
  const armW=10, armH=28;
  px(ctx,cl,bodyX-armW,bodyY+4,armW,armH); px(ctx,cl,bodyX+bodyW,bodyY+4,armW,armH);
  px(ctx,"rgba(0,0,0,0.1)",bodyX-armW,bodyY+4,2,armH); px(ctx,"rgba(0,0,0,0.1)",bodyX+bodyW+armW-2,bodyY+4,2,armH);
  px(ctx,sk,bodyX-armW,bodyY+4+armH,armW,8); px(ctx,sk,bodyX+bodyW,bodyY+4+armH,armW,8);

  // 足
  const legW=16, legH=isChild?20:24;
  px(ctx,cl,bodyX+3,bodyY+bodyH,legW,legH); px(ctx,cl,bodyX+bodyW-legW-3,bodyY+bodyH,legW,legH);
  px(ctx,"rgba(0,0,0,0.1)",bodyX+3,bodyY+bodyH,2,legH); px(ctx,"rgba(0,0,0,0.1)",bodyX+bodyW-legW-3,bodyY+bodyH,2,legH);
  px(ctx,"#3d2b1f",bodyX,bodyY+bodyH+legH,legW+4,5); px(ctx,"#3d2b1f",bodyX+bodyW-legW-3,bodyY+bodyH+legH,legW+4,5);
  px(ctx,"rgba(255,255,255,0.15)",bodyX+2,bodyY+bodyH+legH,legW,2); px(ctx,"rgba(255,255,255,0.15)",bodyX+bodyW-legW-1,bodyY+bodyH+legH,legW,2);
}

// ═══════════════════════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════════════════════
const SIZES = [16,32,64,128];
let currentSize = 64;

function buildUI() {
  // キャラ種類
  const tb = document.getElementById("typeButtons");
  CHAR_TYPES.forEach(t=>{
    const b=document.createElement("button"); b.className="pb"+(config.type===t.id?" on":"");
    b.textContent=t.label;
    b.onclick=()=>{ config.type=t.id; const g=getGroup(); config.hairStyle=HAIRSTYLES[g][0].id; config.outfit=OUTFITS[g][0].id; refresh(); };
    tb.appendChild(b);
  });
  buildSwatches("skinSwatches",SKIN,"skin");
  buildSwatches("hairSwatches",HAIR,"hair");
  buildSwatches("clothSwatches",CLOTH,"cloth");

  // サイズ
  const sb=document.getElementById("sizeButtons");
  SIZES.forEach(s=>{
    const b=document.createElement("button"); b.className="pb"+(currentSize===s?" on":"");
    b.textContent=s+"px";
    b.onclick=()=>{ currentSize=s; refreshSize(); };
    sb.appendChild(b);
  });

  document.getElementById("saveBtn").onclick=()=>{
    const a=document.createElement("a");
    a.download=`pixel_${config.type}_${currentSize}x${currentSize}.png`;
    a.href=document.getElementById("mainCanvas").toDataURL("image/png");
    a.click();
  };
  updateSaveLabel();
  buildHairOutfit(); buildAllSizes(); redraw();
}

function buildSwatches(id,palette,key){
  const el=document.getElementById(id); el.innerHTML="";
  Object.entries(palette).forEach(([k,v])=>{
    const d=document.createElement("div"); d.className="swatch"+(config[key]===v?" on":"");
    d.style.background=v; d.title=k;
    d.onclick=()=>{ config[key]=v; buildSwatches(id,palette,key); redraw(); buildAllSizes(); };
    el.appendChild(d);
  });
}

function buildHairOutfit(){
  const g=getGroup();
  const hb=document.getElementById("hairStyleButtons"); hb.innerHTML="";
  HAIRSTYLES[g].forEach(h=>{
    const b=document.createElement("button"); b.className="pb"+(config.hairStyle===h.id?" on":"");
    b.textContent=h.l;
    b.onclick=()=>{ config.hairStyle=h.id; buildHairOutfit(); redraw(); buildAllSizes(); };
    hb.appendChild(b);
  });
  const ob=document.getElementById("outfitButtons"); ob.innerHTML="";
  OUTFITS[g].forEach(o=>{
    const b=document.createElement("button"); b.className="pb"+(config.outfit===o.id?" on":"");
    b.textContent=o.l;
    b.onclick=()=>{ config.outfit=o.id; buildHairOutfit(); redraw(); buildAllSizes(); };
    ob.appendChild(b);
  });
}

function buildAllSizes(){
  const el=document.getElementById("allSizes"); el.innerHTML="";
  SIZES.forEach(s=>{
    const wrap=document.createElement("div"); wrap.className="size-item";
    const c=document.createElement("canvas");
    drawChar(c,config,s);
    const disp=Math.min(s,64);
    c.style.width=disp+"px"; c.style.height=disp+"px";
    const lbl=document.createElement("span"); lbl.textContent=s+"px";
    wrap.appendChild(c); wrap.appendChild(lbl); el.appendChild(wrap);
  });
}

function redraw(){
  const c=document.getElementById("mainCanvas");
  drawChar(c,config,currentSize);
  c.style.width=DISPLAY_SIZE+"px"; c.style.height=DISPLAY_SIZE+"px";
  document.querySelectorAll("#typeButtons .pb").forEach((b,i)=>{ b.className="pb"+(CHAR_TYPES[i].id===config.type?" on":""); });
}

function refreshSize(){
  document.querySelectorAll("#sizeButtons .pb").forEach((b,i)=>{ b.className="pb"+(SIZES[i]===currentSize?" on":""); });
  updateSaveLabel(); redraw();
}

function updateSaveLabel(){ document.getElementById("saveBtn").textContent=`💾 PNG保存 (${currentSize}×${currentSize})`; }
function refresh(){ buildHairOutfit(); redraw(); buildAllSizes(); }
function getGroup(){ return CHAR_TYPES.find(c=>c.id===config.type)?.group||"adult"; }

function doRandom(){
  const t=CHAR_TYPES[Math.floor(Math.random()*CHAR_TYPES.length)];
  config.type=t.id; const g=t.group;
  config.skin=Object.values(SKIN)[Math.floor(Math.random()*Object.values(SKIN).length)];
  config.hair=Object.values(HAIR)[Math.floor(Math.random()*Object.values(HAIR).length)];
  config.cloth=Object.values(CLOTH)[Math.floor(Math.random()*Object.values(CLOTH).length)];
  config.hairStyle=HAIRSTYLES[g][Math.floor(Math.random()*HAIRSTYLES[g].length)].id;
  config.outfit=OUTFITS[g][Math.floor(Math.random()*OUTFITS[g].length)].id;
  refresh();
}

buildUI();
</script>

</html>
