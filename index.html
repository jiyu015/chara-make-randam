<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ドット絵キャラメーカー</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: 'Press Start 2P', monospace;
    min-height: 100vh;
    padding: 16px;
  }
  h1 {
    text-align: center;
    font-size: clamp(12px, 3vw, 20px);
    color: #fff;
    text-shadow: 0 0 12px #a07aff, 0 0 24px #a07aff;
    margin-bottom: 6px;
  }
  .subtitle {
    text-align: center;
    font-size: 9px;
    color: #a07aff;
    letter-spacing: .3em;
    margin-bottom: 20px;
  }
  .layout {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    justify-content: center;
    max-width: 860px;
    margin: 0 auto;
  }
  .left { flex: 1; min-width: 240px; max-width: 380px; display: flex; flex-direction: column; gap: 10px; }
  .right { flex: 1; min-width: 200px; max-width: 300px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .panel {
    background: #16213e;
    border: 1px solid #333;
    border-radius: 3px;
    padding: 10px;
  }
  .panel-title {
    font-size: 8px;
    color: #888;
    letter-spacing: .2em;
    margin-bottom: 8px;
  }
  .btn-group { display: flex; flex-wrap: wrap; gap: 5px; }
  button.pb {
    border: 2px solid #555;
    background: #2a2a4a;
    color: #e0e0e0;
    cursor: pointer;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 5px 8px;
    border-radius: 2px;
    transition: all .15s;
  }
  button.pb:hover { background: #3a3a6a; border-color: #888; }
  button.pb.on { background: #4a3a8a; border-color: #a07aff; color: #fff; }
  .swatches { display: flex; flex-wrap: wrap; gap: 6px; }
  .swatch {
    width: 22px; height: 22px;
    border: 2px solid #555;
    border-radius: 2px;
    cursor: pointer;
    transition: all .1s;
  }
  .swatch:hover { transform: scale(1.1); }
  .swatch.on { border-color: #fff; transform: scale(1.25); }
  .preview-box {
    background: #16213e;
    border: 2px solid #a07aff;
    border-radius: 3px;
    padding: 14px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  #previewWrap {
    background: #0d0d1a;
    padding: 12px;
    border-radius: 2px;
  }
  #mainCanvas { image-rendering: pixelated; display: block; }
  .size-row { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
  .zoom-row { display: flex; align-items: center; gap: 5px; }
  .zoom-row span { font-size: 8px; color: #888; }
  button.action {
    width: 100%;
    padding: 11px;
    font-size: 11px;
    font-family: 'Press Start 2P', monospace;
    cursor: pointer;
    border-radius: 2px;
    letter-spacing: .05em;
    transition: all .15s;
  }
  button.action:hover { transform: scale(1.02); }
  button.rand { border: 2px solid #fbbf24; background: #2a2000; color: #fbbf24; }
  button.save { border: 2px solid #4ade80; background: #0a2a14; color: #4ade80; }
  .all-sizes { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
  .size-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .size-item canvas { image-rendering: pixelated; background: #0d0d1a; }
  .size-item span { font-size: 7px; color: #666; }
</style>
</head>
<body>

<div class="subtitle">★ PIXEL ART MAKER ★</div>
<h1>ドット絵キャラメーカー</h1>

<div class="layout">
  <!-- 左パネル -->
  <div class="left">

    <div class="panel">
      <div class="panel-title">キャラクター種類</div>
      <div class="btn-group" id="typeButtons"></div>
    </div>

    <div class="panel">
      <div class="panel-title">肌の色</div>
      <div class="swatches" id="skinSwatches"></div>
    </div>

    <div class="panel">
      <div class="panel-title">髪の色</div>
      <div class="swatches" id="hairSwatches"></div>
    </div>

    <div class="panel">
      <div class="panel-title">服の色</div>
      <div class="swatches" id="clothSwatches"></div>
    </div>

    <div class="panel">
      <div class="panel-title">髪型</div>
      <div class="btn-group" id="hairStyleButtons"></div>
    </div>

    <div class="panel">
      <div class="panel-title">服装</div>
      <div class="btn-group" id="outfitButtons"></div>
    </div>

  </div>

  <!-- 右パネル -->
  <div class="right">
    <div class="preview-box">
      <div class="panel-title" style="margin-bottom:0">プレビュー</div>
      <div id="previewWrap">
        <canvas id="mainCanvas"></canvas>
      </div>
      <div class="size-row" id="sizeButtons"></div>
      <div class="zoom-row">
        <span>ズーム:</span>
        <div class="btn-group" id="zoomButtons"></div>
      </div>
    </div>

    <button class="action rand" onclick="doRandom()">🎲 ランダム作成</button>
    <button class="action save" id="saveBtn">💾 PNG保存</button>

    <div class="panel" style="width:100%">
      <div class="panel-title">全サイズ比較</div>
      <div class="all-sizes" id="allSizes"></div>
    </div>
  </div>
</div>

<script>
// ─── データ定義 ──────────────────────────────────────────────
const SKIN   = { pale:"#FFE8D0", light:"#FDDBB4", medium:"#D4956A", dark:"#8B5E3C" };
const HAIR   = { black:"#1A1A1A", brown:"#6B3A2A", blonde:"#E8C84A", white:"#E8E8E8", red:"#C0392B", blue:"#2980B9", green:"#27AE60", pink:"#E91E8C" };
const CLOTH  = { red:"#C0392B", blue:"#2980B9", green:"#27AE60", purple:"#8E44AD", yellow:"#F39C12", white:"#ECF0F1", black:"#2C3E50", pink:"#E91E8C", gold:"#F1C40F", silver:"#BDC3C7", brown:"#795548", navy:"#1A237E" };

const CHAR_TYPES = [
  {id:"child_boy",   label:"👦子供男", group:"child"},
  {id:"child_girl",  label:"👧子供女", group:"child"},
  {id:"young_man",   label:"🧑青年男", group:"adult"},
  {id:"young_woman", label:"👩青年女", group:"adult"},
  {id:"old_man",     label:"👴老人",   group:"elder"},
  {id:"old_woman",   label:"👵老婆",   group:"elder"},
  {id:"king",        label:"👑王様",   group:"royal"},
  {id:"princess",    label:"👸お姫様", group:"royal"},
  {id:"soldier",     label:"⚔️兵士",  group:"soldier"},
];

const HAIRSTYLES = {
  child:   [{id:"short",l:"ショート"},{id:"bowl",l:"おかっぱ"},{id:"spiky",l:"トゲトゲ"}],
  adult:   [{id:"short",l:"ショート"},{id:"long",l:"ロング"},{id:"spiky",l:"トゲトゲ"},{id:"ponytail",l:"ポニーテール"}],
  elder:   [{id:"bald",l:"ハゲ"},{id:"short",l:"白髪"},{id:"bun",l:"まとめ髪"}],
  royal:   [{id:"long",l:"ロング"},{id:"crown",l:"王冠ヘア"},{id:"ponytail",l:"ポニーテール"}],
  soldier: [{id:"short",l:"ショート"},{id:"helmet",l:"兜"}],
};
const OUTFITS = {
  child:   [{id:"casual",l:"カジュアル"},{id:"uniform",l:"制服"}],
  adult:   [{id:"robe",l:"ローブ"},{id:"armor_light",l:"軽鎧"},{id:"casual",l:"カジュアル"}],
  elder:   [{id:"robe",l:"ローブ"},{id:"casual",l:"普段着"}],
  royal:   [{id:"royal_robe",l:"王族ローブ"},{id:"dress",l:"ドレス"}],
  soldier: [{id:"armor",l:"鎧"},{id:"armor_heavy",l:"重鎧"}],
};

const SIZES = [16,32,64,128];
let config = { type:"child_boy", skin:Object.values(SKIN)[0], hair:Object.values(HAIR)[0], cloth:Object.values(CLOTH)[0], hairStyle:"short", outfit:"casual" };
let currentSize = 64;
let currentZoom = 4;

// ─── 描画エンジン ─────────────────────────────────────────────
function drawChar(canvas, cfg, outputSize) {
  const S = 32;
  const ctx = canvas.getContext("2d");
  canvas.width = outputSize; canvas.height = outputSize;
  ctx.clearRect(0,0,outputSize,outputSize);
  ctx.imageSmoothingEnabled = false;

  const tmp = document.createElement("canvas");
  tmp.width = S; tmp.height = S;
  const g = tmp.getContext("2d");
  g.clearRect(0,0,S,S);

  const group = CHAR_TYPES.find(c=>c.id===cfg.type)?.group || "adult";
  const scale = group==="child" ? 0.8 : 1.0;
  const yOff  = group==="child" ? 4 : 0;

  const bodyW = Math.round(8*scale),  bodyH = Math.round(10*scale);
  const bodyX = Math.round((S-bodyW)/2), bodyTop = Math.round(16*scale)+yOff;

  // 胴体
  g.fillStyle = cfg.cloth;
  g.fillRect(bodyX, bodyTop, bodyW, bodyH);

  // 服飾り
  if(cfg.outfit==="royal_robe"||cfg.outfit==="dress"){
    g.fillStyle="#F1C40F"; g.fillRect(bodyX+1,bodyTop,bodyW-2,2);
    g.fillRect(bodyX+Math.floor(bodyW/2)-1,bodyTop,2,bodyH);
  }
  if(cfg.outfit==="armor"||cfg.outfit==="armor_heavy"||cfg.outfit==="armor_light"){
    g.fillStyle="#BDC3C7"; g.fillRect(bodyX,bodyTop,bodyW,3);
    g.fillStyle="#7f8c8d"; g.fillRect(bodyX,bodyTop+3,bodyW,1);
  }
  if(group==="soldier"){
    g.fillStyle="#BDC3C7";
    g.fillRect(bodyX-1,bodyTop+2,2,bodyH-2);
    g.fillRect(bodyX+bodyW-1,bodyTop+2,2,bodyH-2);
  }

  // 足
  const legY=bodyTop+bodyH, legW=Math.round(3*scale), legH=Math.round(4*scale);
  g.fillStyle=cfg.cloth;
  g.fillRect(bodyX+1,legY,legW,legH);
  g.fillRect(bodyX+bodyW-legW-1,legY,legW,legH);
  g.fillStyle="#3d2b1f";
  g.fillRect(bodyX,legY+legH,legW+1,Math.round(2*scale));
  g.fillRect(bodyX+bodyW-legW-1,legY+legH,legW+1,Math.round(2*scale));

  // 腕・手
  const armW=Math.round(2*scale), armH=Math.round(6*scale);
  g.fillStyle=cfg.cloth;
  g.fillRect(bodyX-armW,bodyTop+1,armW,armH);
  g.fillRect(bodyX+bodyW,bodyTop+1,armW,armH);
  g.fillStyle=cfg.skin;
  g.fillRect(bodyX-armW,bodyTop+1+armH,armW,Math.round(2*scale));
  g.fillRect(bodyX+bodyW,bodyTop+1+armH,armW,Math.round(2*scale));

  // 頭
  const headS=Math.round(10*scale);
  const headX=Math.round((S-headS)/2), headY=bodyTop-headS-1+yOff;
  g.fillStyle=cfg.skin;
  g.fillRect(headX,headY,headS,headS);

  // 目
  const eyeY=headY+Math.round(headS*0.35), eyeSz=Math.max(1,Math.round(scale*1.5));
  g.fillStyle="#1a1a1a";
  g.fillRect(headX+Math.round(headS*0.2),eyeY,eyeSz,eyeSz);
  g.fillRect(headX+Math.round(headS*0.65),eyeY,eyeSz,eyeSz);

  // 口
  g.fillStyle="#c0796a";
  g.fillRect(headX+Math.round(headS*0.3),headY+Math.round(headS*0.65),Math.round(headS*0.4),Math.max(1,Math.round(scale)));

  // 老人しわ
  if(group==="elder"){ g.fillStyle="#c9956a"; g.fillRect(headX+1,eyeY-1,1,1); g.fillRect(headX+headS-2,eyeY-1,1,1); }

  // 髪
  g.fillStyle=cfg.hair;
  const hs=cfg.hairStyle;
  if(hs==="short"||hs==="bowl"){
    g.fillRect(headX,headY,headS,Math.round(headS*0.35));
    g.fillRect(headX-1,headY,1,Math.round(headS*0.6));
    g.fillRect(headX+headS,headY,1,Math.round(headS*0.6));
  } else if(hs==="long"){
    g.fillRect(headX,headY,headS,Math.round(headS*0.35));
    g.fillRect(headX-1,headY,2,Math.round(headS*1.4));
    g.fillRect(headX+headS-1,headY,2,Math.round(headS*1.4));
  } else if(hs==="spiky"){
    g.fillRect(headX,headY,headS,Math.round(headS*0.3));
    for(let i=0;i<3;i++) g.fillRect(headX+i*3+1,headY-3,2,4);
  } else if(hs==="ponytail"){
    g.fillRect(headX,headY,headS,Math.round(headS*0.35));
    g.fillRect(headX+headS-2,headY,2,Math.round(headS*1.6));
  } else if(hs==="bun"){
    g.fillRect(headX,headY,headS,Math.round(headS*0.3));
    g.fillRect(headX+Math.round(headS*0.3),headY-3,Math.round(headS*0.4),4);
  } else if(hs==="bald"){
    g.fillStyle="#E8E8E8";
    g.fillRect(headX,headY+Math.round(headS*0.5),headS,Math.round(headS*0.15));
  } else if(hs==="crown"||hs==="helmet"){
    g.fillStyle = hs==="crown" ? "#F1C40F" : "#BDC3C7";
    g.fillRect(headX-1,headY-4,headS+2,5);
    if(hs==="crown") for(let i=0;i<3;i++) g.fillRect(headX+i*3+1,headY-7,2,4);
    g.fillStyle=cfg.hair;
    g.fillRect(headX,headY,headS,Math.round(headS*0.2));
  }

  // 王様王冠
  if(cfg.type==="king"){
    g.fillStyle="#F1C40F"; g.fillRect(headX-1,headY-4,headS+2,4);
    for(let i=0;i<3;i++) g.fillRect(headX+i*3+1,headY-7,2,4);
    g.fillStyle="#e74c3c"; g.fillRect(headX+2,headY-6,1,1); g.fillRect(headX+5,headY-7,1,1); g.fillRect(headX+8,headY-6,1,1);
  }
  // お姫様ティアラ
  if(cfg.type==="princess"){
    g.fillStyle="#F1C40F"; g.fillRect(headX+1,headY-2,headS-2,2);
    g.fillStyle="#e74c3c"; g.fillRect(headX+Math.round(headS/2)-1,headY-4,2,3);
  }

  ctx.drawImage(tmp,0,0,S,S,0,0,outputSize,outputSize);
}

// ─── UI構築 ──────────────────────────────────────────────────
function buildUI() {
  // キャラ種類
  const tb = document.getElementById("typeButtons");
  CHAR_TYPES.forEach(t=>{
    const b = document.createElement("button");
    b.className = "pb" + (config.type===t.id?" on":"");
    b.textContent = t.label;
    b.onclick = ()=>{ config.type=t.id; const g=getGroup(); config.hairStyle=HAIRSTYLES[g][0].id; config.outfit=OUTFITS[g][0].id; refresh(); };
    tb.appendChild(b);
  });

  // 肌色
  buildSwatches("skinSwatches", SKIN, "skin");
  buildSwatches("hairSwatches", HAIR, "hair");
  buildSwatches("clothSwatches", CLOTH, "cloth");

  // サイズボタン
  const sb = document.getElementById("sizeButtons");
  SIZES.forEach(s=>{
    const b = document.createElement("button");
    b.className = "pb" + (currentSize===s?" on":"");
    b.textContent = s+"px";
    b.onclick = ()=>{ currentSize=s; refreshSize(); };
    sb.appendChild(b);
  });

  // ズームボタン
  const zb = document.getElementById("zoomButtons");
  [2,4,6,8].forEach(z=>{
    const b = document.createElement("button");
    b.className = "pb" + (currentZoom===z?" on":"");
    b.textContent = z+"x";
    b.onclick = ()=>{ currentZoom=z; refreshSize(); };
    zb.appendChild(b);
  });

  // 保存
  document.getElementById("saveBtn").onclick = ()=>{
    const a = document.createElement("a");
    a.download = `pixel_${config.type}_${currentSize}x${currentSize}.png`;
    a.href = document.getElementById("mainCanvas").toDataURL("image/png");
    a.click();
  };
  document.getElementById("saveBtn").textContent = `💾 PNG保存 (${currentSize}×${currentSize})`;

  buildHairOutfit();
  buildAllSizes();
  redraw();
}

function buildSwatches(id, palette, key) {
  const el = document.getElementById(id);
  el.innerHTML = "";
  Object.entries(palette).forEach(([k,v])=>{
    const d = document.createElement("div");
    d.className = "swatch" + (config[key]===v?" on":"");
    d.style.background = v;
    d.title = k;
    d.onclick = ()=>{ config[key]=v; buildSwatches(id,palette,key); redraw(); buildAllSizes(); };
    el.appendChild(d);
  });
}

function buildHairOutfit() {
  const g = getGroup();
  // 髪型
  const hb = document.getElementById("hairStyleButtons");
  hb.innerHTML = "";
  HAIRSTYLES[g].forEach(h=>{
    const b = document.createElement("button");
    b.className = "pb" + (config.hairStyle===h.id?" on":"");
    b.textContent = h.l;
    b.onclick = ()=>{ config.hairStyle=h.id; buildHairOutfit(); redraw(); buildAllSizes(); };
    hb.appendChild(b);
  });
  // 服装
  const ob = document.getElementById("outfitButtons");
  ob.innerHTML = "";
  OUTFITS[g].forEach(o=>{
    const b = document.createElement("button");
    b.className = "pb" + (config.outfit===o.id?" on":"");
    b.textContent = o.l;
    b.onclick = ()=>{ config.outfit=o.id; buildHairOutfit(); redraw(); buildAllSizes(); };
    ob.appendChild(b);
  });
}

function buildAllSizes() {
  const el = document.getElementById("allSizes");
  el.innerHTML = "";
  SIZES.forEach(s=>{
    const wrap = document.createElement("div"); wrap.className="size-item";
    const c = document.createElement("canvas");
    const disp = Math.min(s,64);
    c.style.width=disp+"px"; c.style.height=disp+"px";
    drawChar(c, config, s);
    const lbl = document.createElement("span"); lbl.textContent=s+"px";
    wrap.appendChild(c); wrap.appendChild(lbl);
    el.appendChild(wrap);
  });
}

function redraw() {
  const c = document.getElementById("mainCanvas");
  drawChar(c, config, currentSize);
  const disp = currentSize * currentZoom / 4;
  c.style.width = disp+"px"; c.style.height = disp+"px";
  // キャラ種類ボタン更新
  document.querySelectorAll("#typeButtons .pb").forEach((b,i)=>{
    b.className = "pb" + (CHAR_TYPES[i].id===config.type?" on":"");
  });
}

function refreshSize() {
  document.querySelectorAll("#sizeButtons .pb").forEach((b,i)=>{ b.className="pb"+(SIZES[i]===currentSize?" on":""); });
  document.querySelectorAll("#zoomButtons .pb").forEach((b,i)=>{ b.className="pb"+([2,4,6,8][i]===currentZoom?" on":""); });
  document.getElementById("saveBtn").textContent = `💾 PNG保存 (${currentSize}×${currentSize})`;
  redraw();
}

function refresh() {
  buildHairOutfit();
  redraw();
  buildAllSizes();
}

function getGroup() { return CHAR_TYPES.find(c=>c.id===config.type)?.group||"adult"; }

function doRandom() {
  const t = CHAR_TYPES[Math.floor(Math.random()*CHAR_TYPES.length)];
  config.type = t.id;
  const g = t.group;
  config.skin  = Object.values(SKIN)[Math.floor(Math.random()*Object.values(SKIN).length)];
  config.hair  = Object.values(HAIR)[Math.floor(Math.random()*Object.values(HAIR).length)];
  config.cloth = Object.values(CLOTH)[Math.floor(Math.random()*Object.values(CLOTH).length)];
  config.hairStyle = HAIRSTYLES[g][Math.floor(Math.random()*HAIRSTYLES[g].length)].id;
  config.outfit    = OUTFITS[g][Math.floor(Math.random()*OUTFITS[g].length)].id;
  refresh();
}

buildUI();
</script>
</body>
</html>
